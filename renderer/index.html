<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Morse Mouse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Window drag region / title bar -->
  <header class="titlebar">
    <span class="app-title">⬤ &nbsp;Morse Mouse</span>
    <div class="titlebar-right">
      <button id="mode-btn" class="mode-btn" title="Enable Morse PC Input — F8">⌨ PC Input</button>
      <div id="status-dot" class="status-dot" title="Press active"></div>
    </div>
  </header>

  <main class="layout">

    <!-- ── Big click zone ────────────────────────────── -->
    <section id="input-zone" class="input-zone" role="button" aria-label="Morse input area. Click and hold for dash, tap for dot." tabindex="0">
      <div id="ripple-container" class="ripple-container" aria-hidden="true"></div>
      <div class="input-hint">
        <p class="hint-primary">Click &amp; Hold</p>
        <p class="hint-secondary">
          <span class="tag dot-tag">tap&nbsp;=&nbsp;<b>·</b></span>
          &nbsp;
          <span class="tag dash-tag">hold&nbsp;=&nbsp;<b>—</b></span>
        </p>
      </div>
    </section>

    <!-- ── Output panel ───────────────────────────────── -->
    <section class="output-panel">

      <div class="output-block">
        <label class="output-label">Morse</label>
        <div id="morse-display" class="output-value morse-value" aria-live="polite"></div>
      </div>

      <div class="divider"></div>

      <div class="output-block">
        <label class="output-label">Decoded</label>
        <div id="decoded-display" class="output-value decoded-value" aria-live="polite">—</div>
      </div>

      <button id="clear-btn" class="clear-btn" title="Clear (reset)">✕ Clear</button>

    </section>

    <!-- ── Reference cheat-sheet ─────────────────────── -->
    <section class="cheatsheet">
      <div class="cheatsheet-header">Morse Reference</div>
      <div class="morse-grid">
        <div class="morse-card"><span class="mc-letter">A</span><span class="mc-code">·—</span></div>
        <div class="morse-card"><span class="mc-letter">B</span><span class="mc-code">—···</span></div>
        <div class="morse-card"><span class="mc-letter">C</span><span class="mc-code">—·—·</span></div>
        <div class="morse-card"><span class="mc-letter">D</span><span class="mc-code">—··</span></div>
        <div class="morse-card"><span class="mc-letter">E</span><span class="mc-code">·</span></div>
        <div class="morse-card"><span class="mc-letter">F</span><span class="mc-code">··—·</span></div>
        <div class="morse-card"><span class="mc-letter">G</span><span class="mc-code">——·</span></div>
        <div class="morse-card"><span class="mc-letter">H</span><span class="mc-code">····</span></div>
        <div class="morse-card"><span class="mc-letter">I</span><span class="mc-code">··</span></div>
        <div class="morse-card"><span class="mc-letter">J</span><span class="mc-code">·———</span></div>
        <div class="morse-card"><span class="mc-letter">K</span><span class="mc-code">—·—</span></div>
        <div class="morse-card"><span class="mc-letter">L</span><span class="mc-code">·—··</span></div>
        <div class="morse-card"><span class="mc-letter">M</span><span class="mc-code">——</span></div>
        <div class="morse-card"><span class="mc-letter">N</span><span class="mc-code">—·</span></div>
        <div class="morse-card"><span class="mc-letter">O</span><span class="mc-code">———</span></div>
        <div class="morse-card"><span class="mc-letter">P</span><span class="mc-code">·——·</span></div>
        <div class="morse-card"><span class="mc-letter">Q</span><span class="mc-code">——·—</span></div>
        <div class="morse-card"><span class="mc-letter">R</span><span class="mc-code">·—·</span></div>
        <div class="morse-card"><span class="mc-letter">S</span><span class="mc-code">···</span></div>
        <div class="morse-card"><span class="mc-letter">T</span><span class="mc-code">—</span></div>
        <div class="morse-card"><span class="mc-letter">U</span><span class="mc-code">··—</span></div>
        <div class="morse-card"><span class="mc-letter">V</span><span class="mc-code">···—</span></div>
        <div class="morse-card"><span class="mc-letter">W</span><span class="mc-code">·——</span></div>
        <div class="morse-card"><span class="mc-letter">X</span><span class="mc-code">—··—</span></div>
        <div class="morse-card"><span class="mc-letter">Y</span><span class="mc-code">—·——</span></div>
        <div class="morse-card"><span class="mc-letter">Z</span><span class="mc-code">——··</span></div>
        <div class="morse-card"><span class="mc-letter">0</span><span class="mc-code">—————</span></div>
        <div class="morse-card"><span class="mc-letter">1</span><span class="mc-code">·————</span></div>
        <div class="morse-card"><span class="mc-letter">2</span><span class="mc-code">··———</span></div>
        <div class="morse-card"><span class="mc-letter">3</span><span class="mc-code">···——</span></div>
        <div class="morse-card"><span class="mc-letter">4</span><span class="mc-code">····—</span></div>
        <div class="morse-card"><span class="mc-letter">5</span><span class="mc-code">·····</span></div>
        <div class="morse-card"><span class="mc-letter">6</span><span class="mc-code">—····</span></div>
        <div class="morse-card"><span class="mc-letter">7</span><span class="mc-code">——···</span></div>
        <div class="morse-card"><span class="mc-letter">8</span><span class="mc-code">———··</span></div>
        <div class="morse-card"><span class="mc-letter">9</span><span class="mc-code">————·</span></div>
      </div>
    </section>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
